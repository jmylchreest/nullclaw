apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nullclaw
  namespace: nullclaw
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
spec:
  ingressClassName: traefik
  rules:
    - host: nc.home.i0.pm
      http:
        paths:
          # WebSocket path for web UI channel
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: nullclaw-web
                port:
                  number: 32123
          # Gateway API (health, pairing, webhooks, etc.)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nullclaw-web
                port:
                  number: 3000
