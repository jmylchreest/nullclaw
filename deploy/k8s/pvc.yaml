apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nullclaw-data
  namespace: nullclaw
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
